<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- HEADER (igual ao outro) -->
    <header>
        <nav class="navbar sticky-top bg-body-tertiary">
            <div class="nav-container">

                <div id="header-left-content">
                    <img src="./assets/logo.svg" />
                    <div id="header-title">FOME ZERO</div>
                </div>

                <div id="header-right-content">
                    <a href="index.html">Home</a>
                    <a>Doações</a>
                    <a href="doe.html">Doe alimento</a>
                </div>

            </div>
        </nav>
    </header>

    <!-- FORM -->
    <section class="form-section">
        <div class="form-container">

            <h1>Doar alimento</h1>
            <p>Compartilhe comida com quem precisa</p>

            <form>

                <div class="mb-3">
                    <label class="form-label">Nome do alimento</label>
                    <input type="text" class="form-control" placeholder="Ex: Marmita, frutas..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <select class="form-select">
                        <option>Refeição pronta</option>
                        <option>Vegetais</option>
                        <option>Frutas</option>
                        <option>Outros</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="text" class="form-control" placeholder="Ex: 5 porções" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Endereço</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Disponível a partir de</label>
                        <input type="time" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Até</label>
                        <input type="time" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Observações</label>
                    <textarea class="form-control" rows="3"></textarea>
                </div>

                <div class="info-box">
                    <strong>Importante:</strong> Certifique-se de que todos os alimentos estão seguros para consumo e
                    devidamente armazenados. Inclua informações sobre alergênicos nas observações.
                </div>

                <div class="form-buttons">
                    <button type="button" class="btn-cancel" onclick="window.location.href='index.html'">
                        Cancelar
                    </button>
                    <button type="submit" class="btn-submit">Publicar</button>
                </div>

            </form>

        </div>
    </section>

</body>

</html>
